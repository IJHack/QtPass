version: "{build}"

image: Visual Studio 2022

branches:
  only:
    - main

skip_tags: false

environment:
  QT_VERSION: 6.8.0
  QT_ARCH: win64_mingw
  QT_ROOT: C:\Qt
  INNO_DIR: C:\Program Files (x86)\Inno Setup 6

install:
  - choco install -y innosetup
  - py -3 -m pip install --upgrade pip
  - py -3 -m pip install aqtinstall
  - if not exist C:\Qt mkdir C:\Qt
  - py -3 -m aqt install-qt --outputdir %QT_ROOT% windows desktop %QT_VERSION% %QT_ARCH%
  - dir C:\Qt
  - set QT_DIR=%QT_ROOT%\%QT_VERSION%\%QT_ARCH%
  - set PATH=%QT_DIR%\bin;%PATH%;%INNO_DIR%
  - echo QT_DIR=%QT_DIR%
  - qmake -v

build_script:
  - qmake qtpass.pro CONFIG+=release
  - mingw32-make

  - if exist dist rmdir /s /q dist
  - mkdir dist\qtpass

  - copy src\release\qtpass.exe dist\qtpass\qtpass.exe
  - windeployqt --release --dir dist\qtpass dist\qtpass\qtpass.exe

  - copy README.md dist\qtpass\README.txt
  - copy LICENSE dist\qtpass\LICENSE.txt

  - dir dist\qtpass
  - iscc /DMyAppVersion=%APPVEYOR_REPO_TAG_NAME% qtpass.iss

artifacts:
  - path: Output\qtpass-*.exe
    name: installer
  - path: dist\qtpass\qtpass.exe
    name: binary

deploy:
  - provider: GitHub
    auth_token:
      secure: YfscG1DR0+kApThPXxQSr+ZEjUOUlIG0Tqc5+90IFsUInyICRRMdbJsbxR2qhq/p
    artifact: installer
    draft: true
    prerelease: false
    on:
      APPVEYOR_REPO_TAG: true
