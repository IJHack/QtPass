---
name: Release Build

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  merge_group:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      qt: ${{ steps.filter.outputs.qt }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          base: main
          filters: |
            src:
              - "src/**"
              - "**.cpp"
              - "**.h"
              - "**.hpp"
              - "**.ui"
              - "**.qrc"
            tests:
              - "tests/**"
            qt:
              - "**.pro"
              - "**.pri"

  build-windows:
    needs: changes
    runs-on: windows-latest
    steps:
      - name: Check if build needed
        id: need_build
        shell: bash
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_SRC}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_TESTS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_QT}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "merge_group" ]] || \
             [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEEDS_CHANGES_OUTPUTS_SRC: ${{ needs.changes.outputs.src }}
          NEEDS_CHANGES_OUTPUTS_TESTS: ${{ needs.changes.outputs.tests }}
          NEEDS_CHANGES_OUTPUTS_QT: ${{ needs.changes.outputs.qt }}

      - name: No changes - skipping
        if: steps.need_build.outputs.run_build != 'true'
        run: echo "No relevant changes - skipping Windows build"

      - uses: actions/checkout@v6.0.2
        if: steps.need_build.outputs.run_build == 'true'
        with:
          persist-credentials: false

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        if: steps.need_build.outputs.run_build == 'true'

      - uses: jurplel/install-qt-action@v4.3.1
        if: steps.need_build.outputs.run_build == 'true'

      - name: Install Inno Setup
        if: steps.need_build.outputs.run_build == 'true'
        run: choco install --yes innosetup

      - name: Resolve installer version
        if: steps.need_build.outputs.run_build == 'true'
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $version = "1.5.1"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $line = Get-Content qtpass.pri | Where-Object { $_ -match '^VERSION\s*=' } | Select-Object -First 1
            if ($line -and ($line -match '=\s*([0-9]+\.[0-9]+\.[0-9]+)')) {
              $version = $matches[1]
            }
          }

          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows installer
        if: steps.need_build.outputs.run_build == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          qmake qtpass.pro CONFIG+=release
          nmake

          New-Item -ItemType Directory -Force -Path dist\qtpass | Out-Null

          if (Test-Path "main\release\qtpass.exe") {
            Copy-Item "main\release\qtpass.exe" "dist\qtpass\qtpass.exe"
          } elseif (Test-Path "src\release\qtpass.exe") {
            Copy-Item "src\release\qtpass.exe" "dist\qtpass\qtpass.exe"
          } else {
            throw "Could not locate built qtpass.exe"
          }

          Copy-Item "README.md" "dist\qtpass\README.txt"
          Copy-Item "LICENSE" "dist\qtpass\LICENSE.txt"

          windeployqt --release --dir dist\qtpass dist\qtpass\qtpass.exe

          iscc "/DMyAppVersion=$env:STEPS_VERSION_OUTPUTS_VERSION" qtpass.iss
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload installer artifact
        if: steps.need_build.outputs.run_build == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: qtpass-windows-installer-${{ steps.version.outputs.version }}
          path: Output/qtpass-*.exe

  build-macos:
    needs: changes
    runs-on: macos-latest
    steps:
      - name: Check if build needed
        id: need_build
        shell: bash
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_SRC}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_TESTS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_QT}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "merge_group" ]] || \
             [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEEDS_CHANGES_OUTPUTS_SRC: ${{ needs.changes.outputs.src }}
          NEEDS_CHANGES_OUTPUTS_TESTS: ${{ needs.changes.outputs.tests }}
          NEEDS_CHANGES_OUTPUTS_QT: ${{ needs.changes.outputs.qt }}

      - name: No changes - skipping
        if: steps.need_build.outputs.run_build != 'true'
        run: echo "No relevant changes - skipping macOS build"

      - uses: actions/checkout@v6.0.2
        if: steps.need_build.outputs.run_build == 'true'
        with:
          persist-credentials: false

      - uses: jurplel/install-qt-action@v4.3.1
        if: steps.need_build.outputs.run_build == 'true'

      - name: Install dmg helper
        if: steps.need_build.outputs.run_build == 'true'
        run: brew install create-dmg

      - name: Resolve dmg version
        if: steps.need_build.outputs.run_build == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="1.5.1"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version_from_pri="$(awk -F '=' '/^VERSION[[:space:]]*=/{ gsub(/[[:space:]]/, "", $2); print $2; exit }' qtpass.pri)"
            if [[ -n "${version_from_pri}" ]]; then
              version="${version_from_pri}"
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build macOS app and dmg
        if: steps.need_build.outputs.run_build == 'true'
        run: |
          set -euo pipefail

          qmake qtpass.pro CONFIG+=release
          make

          APP_PATH="main/QtPass.app"
          if [ ! -d "$APP_PATH" ]; then
            if [ -d "src/QtPass.app" ]; then
              APP_PATH="src/QtPass.app"
            else
              echo "QtPass.app not found" >&2
              exit 1
            fi
          fi

          macdeployqt "$APP_PATH"

          DMG_NAME="QtPass-${STEPS_VERSION_OUTPUTS_VERSION}.dmg"
          create-dmg "$DMG_NAME" "$APP_PATH"
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload dmg artifact
        if: steps.need_build.outputs.run_build == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: qtpass-macos-dmg-${{ steps.version.outputs.version }}
          path: QtPass-*.dmg
