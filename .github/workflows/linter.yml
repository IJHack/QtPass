---
name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      code: ${{ steps.filter.outputs.code }}
      qt: ${{ steps.filter.outputs.qt }}
      yaml: ${{ steps.filter.outputs.yaml }}
      markdown: ${{ steps.filter.outputs.markdown }}
      scripts: ${{ steps.filter.outputs.scripts }}
      json: ${{ steps.filter.outputs.json }}
      github: ${{ steps.filter.outputs.github }}
      localization: ${{ steps.filter.outputs.localization }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: main
          filters: |
            src:
              - "src/**"
            tests:
              - "tests/**"
            code:
              - "**.cpp"
              - "**.h"
              - "**.hpp"
            qt:
              - "**.pro"
              - "**.pri"
            yaml:
              - "**.yml"
              - "**.yaml"
            markdown:
              - "**.md"
            scripts:
              - "**.sh"
            json:
              - "**.json"
            github:
              - ".github/**"
            localization:
              - "localization/**"

  build:
    needs: changes
    name: Lint Code Base
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check if lint needed
        id: need_lint
        shell: bash
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_SRC}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_TESTS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_CODE}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_QT}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_YAML}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_MARKDOWN}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_SCRIPTS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_JSON}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_GITHUB}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_LOCALIZATION}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "run_lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_lint=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEEDS_CHANGES_OUTPUTS_SRC: ${{ needs.changes.outputs.src }}
          NEEDS_CHANGES_OUTPUTS_TESTS: ${{ needs.changes.outputs.tests }}
          NEEDS_CHANGES_OUTPUTS_CODE: ${{ needs.changes.outputs.code }}
          NEEDS_CHANGES_OUTPUTS_QT: ${{ needs.changes.outputs.qt }}
          NEEDS_CHANGES_OUTPUTS_YAML: ${{ needs.changes.outputs.yaml }}
          NEEDS_CHANGES_OUTPUTS_MARKDOWN: ${{ needs.changes.outputs.markdown }}
          NEEDS_CHANGES_OUTPUTS_SCRIPTS: ${{ needs.changes.outputs.scripts }}
          NEEDS_CHANGES_OUTPUTS_JSON: ${{ needs.changes.outputs.json }}
          NEEDS_CHANGES_OUTPUTS_GITHUB: ${{ needs.changes.outputs.github }}
          NEEDS_CHANGES_OUTPUTS_LOCALIZATION: ${{ needs.changes.outputs.localization }}

      - name: No changes - skipping
        if: steps.need_lint.outputs.run_lint != 'true'
        run: echo "No relevant changes - skipping lint"

      - name: Checkout Code
        if: steps.need_lint.outputs.run_lint == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - if: steps.need_lint.outputs.run_lint == 'true'
        run: cat .github/super-linter.env >> "$GITHUB_ENV"

      - name: Lint Code Base
        if: steps.need_lint.outputs.run_lint == 'true'
        uses: super-linter/super-linter@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
