---
name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      code: ${{ steps.filter.outputs.code }}
      qt: ${{ steps.filter.outputs.qt }}
      yaml: ${{ steps.filter.outputs.yaml }}
      markdown: ${{ steps.filter.outputs.markdown }}
      scripts: ${{ steps.filter.outputs.scripts }}
      json: ${{ steps.filter.outputs.json }}
      github: ${{ steps.filter.outputs.github }}
      localization: ${{ steps.filter.outputs.localization }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: main
          filters: |
            src:
              - "src/**"
            tests:
              - "tests/**"
            code:
              - "**.cpp"
              - "**.h"
              - "**.hpp"
            qt:
              - "**.pro"
              - "**.pri"
            yaml:
              - "**.yml"
              - "**.yaml"
            markdown:
              - "**.md"
            scripts:
              - "**.sh"
            json:
              - "**.json"
            github:
              - ".github/**"
            localization:
              - "localization/**"

  build:
    needs: changes
    if: >-
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.tests == 'true' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.qt == 'true' ||
      needs.changes.outputs.yaml == 'true' ||
      needs.changes.outputs.markdown == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      needs.changes.outputs.json == 'true' ||
      needs.changes.outputs.github == 'true' ||
      needs.changes.outputs.localization == 'true' ||
      github.event_name == 'merge_group'
    name: Lint Code Base
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: cat .github/super-linter.env >> "$GITHUB_ENV"
      - name: Lint Code Base
        uses: github/super-linter@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-op:
    needs: changes
    if: >-
      needs.changes.outputs.src != 'true' &&
      needs.changes.outputs.tests != 'true' &&
      needs.changes.outputs.code != 'true' &&
      needs.changes.outputs.qt != 'true' &&
      needs.changes.outputs.yaml != 'true' &&
      needs.changes.outputs.markdown != 'true' &&
      needs.changes.outputs.scripts != 'true' &&
      needs.changes.outputs.json != 'true' &&
      needs.changes.outputs.github != 'true' &&
      needs.changes.outputs.localization != 'true' &&
      github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes - skipping lint"
