name: publiccode.yml validation

on: [pull_request, push]

permissions: {}

jobs:
  publiccode_yml_validation:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: italia/publiccode-parser-action@v1
        with:
          publiccode: "publiccode.yml"
