name: publiccode.yml validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  publiccode_yml_validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: italia/publiccode-parser-action@v1
        with:
          publiccode: "publiccode.yml"
