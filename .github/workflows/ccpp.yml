---
name: QMake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      qt: ${{ steps.filter.outputs.qt }}
      localization: ${{ steps.filter.outputs.localization }}
      icons: ${{ steps.filter.outputs.icons }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: main
          filters: |
            src:
              - "src/**"
              - "**.cpp"
              - "**.h"
              - "**.hpp"
              - "**.ui"
              - "**.qrc"
            tests:
              - "tests/**"
            qt:
              - "**.pro"
              - "**.pri"
            localization:
              - "localization/**"
            icons:
              - "icons/**"
            docs:
              - "docs/**"

  build:
    needs: changes
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        qt: ["6.8"]
        include:
          - os: ubuntu-latest
            qt: "5.15"

    steps:
      - name: Check if build needed
        id: need_build
        shell: bash
        run: |
          if [[ "${NEEDS_CHANGES_OUTPUTS_SRC}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_TESTS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_QT}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_LOCALIZATION}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_ICONS}" == "true" ]] || \
             [[ "${NEEDS_CHANGES_OUTPUTS_DOCS}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEEDS_CHANGES_OUTPUTS_SRC: ${{ needs.changes.outputs.src }}
          NEEDS_CHANGES_OUTPUTS_TESTS: ${{ needs.changes.outputs.tests }}
          NEEDS_CHANGES_OUTPUTS_QT: ${{ needs.changes.outputs.qt }}
          NEEDS_CHANGES_OUTPUTS_LOCALIZATION: ${{ needs.changes.outputs.localization }}
          NEEDS_CHANGES_OUTPUTS_ICONS: ${{ needs.changes.outputs.icons }}
          NEEDS_CHANGES_OUTPUTS_DOCS: ${{ needs.changes.outputs.docs }}

      - name: No changes - skipping
        if: steps.need_build.outputs.run_build != 'true'
        run: echo "No relevant changes - skipping build"

      - uses: actions/checkout@v6
        if: steps.need_build.outputs.run_build == 'true'
        with:
          persist-credentials: false

      - uses: ilammy/msvc-dev-cmd@v1
        if: steps.need_build.outputs.run_build == 'true'

      - name: Install Qt
        if: steps.need_build.outputs.run_build == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && steps.need_build.outputs.run_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pinentry-tty pass pass-extension-otp

      - name: Configure Git for tests
        if: steps.need_build.outputs.run_build == 'true'
        run: |
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS' && steps.need_build.outputs.run_build == 'true'
        run: |
          brew install pass pass-otp

      - name: qmake
        if: steps.need_build.outputs.run_build == 'true'
        run: qmake

      - name: make
        if: steps.need_build.outputs.run_build == 'true'
        run: ${{ runner.os == 'Windows' && 'nmake' || 'make' }}

      - name: make check
        if: steps.need_build.outputs.run_build == 'true'
        run: ${{ runner.os == 'Windows' && 'nmake' || 'make' }} check TESTARGS="--platform offscreen"
