---
name: QMake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      qt: ${{ steps.filter.outputs.qt }}
      localization: ${{ steps.filter.outputs.localization }}
      icons: ${{ steps.filter.outputs.icons }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: main
          filters: |
            src:
              - "src/**"
              - "**.cpp"
              - "**.h"
              - "**.hpp"
              - "**.ui"
              - "**.qrc"
            tests:
              - "tests/**"
            qt:
              - "**.pro"
              - "**.pri"
            localization:
              - "localization/**"
            icons:
              - "icons/**"
            docs:
              - "docs/**"

  build:
    needs: changes
    if: >-
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.tests == 'true' ||
      needs.changes.outputs.qt == 'true' ||
      needs.changes.outputs.localization == 'true' ||
      needs.changes.outputs.icons == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      github.event_name == 'merge_group'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        qt: ["6.8"]
        include:
          - os: ubuntu-latest
            qt: "5.15"

    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}

      - name: qmake
        run: qmake

      - name: make
        run: ${{ runner.os == 'Windows' && 'nmake' || 'make' }}

      - name: make check
        run: ${{ runner.os == 'Windows' && 'nmake' || 'make' }} check TESTARGS="--platform offscreen"
