name: REUSE compliance check

# Note: REUSE is a repository-wide compliance check - no path filtering
# to catch licensing issues in any newly added files (scripts, docs, etc.)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

permissions: {}

jobs:
  reuse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v6.0.0
