name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm

      - name: Install linters
        run: npm ci

      - name: Lint just the root HTML
        run: npx htmlhint "*.html"

      - name: Lint JavaScript
        run: npx eslint .
