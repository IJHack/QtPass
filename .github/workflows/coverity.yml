name: Coverity Scan

on:
  workflow_dispatch:
  push:
    branches:
      - coverity_scan
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  coverity:
    if: github.repository == 'IJHack/QtPass'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      COVERITY_PROJECT: IJHack/qtpass

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: "6.9.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qmake6 \
            qt6-base-dev \
            qt6-tools-dev-tools \
            libqt6svg6-dev \
            libqrencode-dev \
            zlib1g-dev \
            curl \
            xz-utils \
            tar

      - name: Download Coverity build tool
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
        run: |
          set -euxo pipefail
          test -n "${TOKEN}"

          curl -fL \
            --data-urlencode "token=${TOKEN}" \
            --data-urlencode "project=${COVERITY_PROJECT}" \
            https://scan.coverity.com/download/linux64 \
            -o coverity_tool.tgz

          rm -rf coverity_tool
          mkdir -p coverity_tool
          tar xzf coverity_tool.tgz --strip 1 -C coverity_tool

          test -x coverity_tool/bin/cov-build

      - name: Configure
        run: |
          set -euxo pipefail
          qmake6 qtpass.pro

      - name: Build under Coverity
        run: |
          set -euxo pipefail
          export PATH="${GITHUB_WORKSPACE}/coverity_tool/bin:${PATH}"
          cov-build --dir cov-int make -j"$(nproc)"

      - name: Archive analysis bundle
        run: |
          set -euxo pipefail
          tar -caf qtpass-coverity.tar.xz cov-int

      - name: Submit to Coverity Scan
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
        run: |
          set -euxo pipefail
          test -n "${TOKEN}"
          test -n "${EMAIL}"

          curl -fL \
            --form token="${TOKEN}" \
            --form email="${EMAIL}" \
            --form file=@qtpass-coverity.tar.xz \
            --form version="${GITHUB_SHA}" \
            --form description="GitHub Actions build from ${GITHUB_REF_NAME}" \
            "https://scan.coverity.com/builds?project=${COVERITY_PROJECT}"
